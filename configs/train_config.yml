# ──────────────────────────────────────────────────────────────────────────────
# configs/train_config.yaml
# DreamBooth LoRA SDXL Inpainting – example configuration
# ──────────────────────────────────────────────────────────────────────────────

model:
  pretrained_model_name_or_path: "diffusers/stable-diffusion-xl-1.0-inpainting-0.1"
  pretrained_vae_model_name_or_path: null   # e.g. "madebyollin/sdxl-vae-fp16-fix"

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  dataset_dir: "data/interior"
  images_subdir: "images"
  masks_subdir:  "masks"
  json_file:     "prompts.json"

  train_ratio: 0.8
  val_ratio:   0.1

  center_crop:   false
  random_flip:   true
  num_workers:   4
  repeats:       1

  mask_min_area: 0.1
  mask_max_area: 0.5

# ── DreamBooth ────────────────────────────────────────────────────────────────
dreambooth:
  instance_prompt: "interior design, high quality"

  with_prior_preservation: false
  prior_loss_weight: 1.0
  class_prompt: "a room"
  class_data_dir: "data/class_images"
  num_class_images: 200

  train_text_encoder: false

# ── LoRA ──────────────────────────────────────────────────────────────────────
lora:
  rank:     32
  alpha:    32
  dropout:  0.1
  use_dora: false
  rank_ff:    16
  rank_xattn: 16

# ── Loss weights  (must sum to 1.0 = 100%) ───────────────────────────────────
#
#  Budget breakdown:
#  ┌──────────────────┬───────┬───────────────────────────────────────────────┐
#  │ Loss             │  Pct  │ Purpose                                       │
#  ├──────────────────┼───────┼───────────────────────────────────────────────┤
#  │ diffusion (MSE)  │  50%  │ Core denoising — always the primary signal    │
#  │ pixel (L1)       │  15%  │ Pixel fidelity on the masked region           │
#  │ perceptual (VGG) │  15%  │ Texture/material quality (VGG relu4_3)        │
#  │ clip             │   8%  │ Text-image semantic alignment ([CLS] token)   │
#  │ boundary (edge)  │   5%  │ Seamless blending at mask boundary            │
#  │ depth (MiDaS)    │   4%  │ 3-D spatial consistency of the scene          │
#  │ semantic (CLIP)  │   3%  │ High-level patch-token feature consistency    │
#  └──────────────────┴───────┴───────────────────────────────────────────────┘
#  Total = 1.00
#
#  Tips for tuning:
#  • Set a weight to 0.0 to disable that loss entirely (saves compute).
#  • For datasets > 500 images you can safely raise perceptual_weight to 0.20
#    and lower pixel_weight to 0.10.
#  • depth and semantic require torch.hub download on first run; set to 0.0 if
#    offline or if VRAM is tight (< 16 GB).
#  • aux_loss_every_n_steps: 1 computes aux losses every step (accurate but
#    slow if perceptual/depth/semantic are enabled).  Set to 4 or 8 to compute
#    auxiliary losses only every N gradient steps for ~2-3× speed-up.
#
loss_weights:
  diffusion_weight:  0.50   # 50%
  pixel_weight:      0.15   # 15%
  perceptual_weight: 0.15   # 15%
  clip_weight:       0.08   #  8%
  boundary_weight:   0.05   #  5%
  depth_weight:      0.04   #  4%
  semantic_weight:   0.03   #  3%
  aux_loss_every_n_steps: 1  # compute aux losses every N steps (1 = every step)

# ── Training ──────────────────────────────────────────────────────────────────
training:
  output_dir: "outputs/sdxl-inpaint-lora"
  resolution: 1024

  train_batch_size: 1
  sample_batch_size: 1
  gradient_accumulation_steps: 4
  gradient_checkpointing: true

  num_train_epochs: 10
  max_train_steps: null

  learning_rate: 1.0e-4
  text_encoder_lr: 1.0e-5
  lr_scheduler: "cosine"
  lr_warmup_steps: 100
  lr_num_cycles: 1
  lr_power: 1.0

  optimizer: "adamw"
  use_8bit_adam: false
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 1.0e-2
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  seed: 42
  mixed_precision: "fp16"

  enable_xformers: false
  do_edm_style_training: false
  snr_gamma: null

  checkpointing_steps: 500
  checkpoints_total_limit: 3
  resume_from_checkpoint: null

  output_kohya_format: false

# ── Validation ────────────────────────────────────────────────────────────────
validation:
  validation_steps: 500
  num_validation_images: 4

  # ★ NEW: Mask dilation settings
  # The mask used for inference is dilated by (mask_dilation_pct * min(H,W))
  # pixels so the inpainting pipeline has a small "safety margin" around the
  # true masked region.  The dilated mask is capped at mask_max_area_pct of
  # the total image area to prevent excessive context erasure.
  mask_dilation_pct: 0.10   # expand mask radius by 10% of min(H,W)
  mask_max_area_pct: 0.70   # dilated mask never exceeds 70% of image area

  # Comparison images in WandB now show 4 panels:
  #   [Original] | [Mask overlay (dilated, red tint)] | [Erased hole] | [Inpainted]

# ── Logging / WandB ───────────────────────────────────────────────────────────
logging:
  report_to: "wandb"
  run_name: "sdxl-inpaint-lora-run1"

  wandb_project:  "sdxl-inpaint-dreambooth"
  wandb_entity:   null
  wandb_run_name: null
  wandb_tags:
    - "sdxl"
    - "inpainting"
    - "lora"
    - "interior-design"
  wandb_notes: ""
  wandb_api_key: null

  log_every_n_steps: 10

